<script>

  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const API    = 'https://script.google.com/macros/s/AKfycbzpJgvkbJ2JQkKUwOHL1XPRMM5_eOh9SjfLEBxlKesIswJ3DXVj63q_LsmdMRXkWLBy/exec';
  const SECRET = '20002600!?';

  // LocalStorage keys
  const LKEY       = 'listado_key';
  const TKEY       = 'listado_today';
  const CKEY       = 'listado_cat_colors';
  const LORDER_KEY = 'listado_list_order';

  // Category color palette
  const CAT_PALETTE = [
    { bg: 'rgba(120,180,255,0.13)', border: 'rgba(120,180,255,0.35)', text: '#7ab4ff' },
    { bg: 'rgba(180,140,255,0.13)', border: 'rgba(180,140,255,0.35)', text: '#b48cff' },
    { bg: 'rgba(255,170,100,0.13)', border: 'rgba(255,170,100,0.35)', text: '#ffaa64' },
    { bg: 'rgba(80,210,160,0.13)',  border: 'rgba(80,210,160,0.35)',  text: '#50d2a0' },
    { bg: 'rgba(255,130,130,0.13)', border: 'rgba(255,130,130,0.35)', text: '#ff8282' },
    { bg: 'rgba(255,220,80,0.13)',  border: 'rgba(255,220,80,0.35)',  text: '#ffd040' },
    { bg: 'rgba(100,210,230,0.13)', border: 'rgba(100,210,230,0.35)', text: '#64d2e6' },
    { bg: 'rgba(240,140,200,0.13)', border: 'rgba(240,140,200,0.35)', text: '#f08cc8' },
  ];

  // ─── STATE ─────────────────────────────────────────────────────────────────
  let tasks           = [];
  let categories      = [];
  let currentCat      = 'today';
  let editingId       = null;
  let todayIds        = new Set();
  let listOrder       = [];
  let catColors       = {};
  let searchState     = { query: '', filter: 'all' };
  let listSearchQuery = '';

  // Drag state — categories
  let catDragIdx     = null;
  let catDragOverIdx = null;

  // Drag state — tasks
  let dragSrcId = null;

  // Global search
  let globalSearchOpen = false;
  let _gsrActions      = [];

  // Rename modal state
  let renamingCat = null;

  // ─── CATEGORY COLORS ───────────────────────────────────────────────────────
  function loadCatColors() {
    try {
      catColors = JSON.parse(localStorage.getItem(CKEY) || '{}');
    } catch (e) {
      catColors = {};
    }
  }

  function saveCatColors() {
    localStorage.setItem(CKEY, JSON.stringify(catColors));
  }

  function assignCatColor(name) {
    if (catColors[name]) return catColors[name];
    const usedIndexes = Object.values(catColors).map(c => c.idx);
    let idx = 0;
    while (usedIndexes.includes(idx) && idx < CAT_PALETTE.length) idx++;
    catColors[name] = { idx, ...CAT_PALETTE[idx] };
    saveCatColors();
    return catColors[name];
  }

  function getCatColor(name) {
    return catColors[name] || assignCatColor(name);
  }

  // ─── DATE HELPERS ──────────────────────────────────────────────────────────
  // Dates stored internally as YYYY-MM-DD.
  // User input/output always as DD/MM/YYYY.

  /** Normalize any incoming date string from API → YYYY-MM-DD, or '' if invalid. */
  function normalizeToISO(raw) {
    if (!raw) return '';
    raw = String(raw).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    const dmy = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
    const isoT = raw.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if (isoT) return `${isoT[1]}-${isoT[2]}-${isoT[3]}`;
    const garbled = raw.match(/^(\d{1,2})T[\d:.Z]+\/(\d{1,2})\/(\d{4})$/);
    if (garbled) return `${garbled[3]}-${garbled[2].padStart(2,'0')}-${garbled[1].padStart(2,'0')}`;
    return '';
  }

  /** YYYY-MM-DD → DD/MM/YYYY for display */
  function isoToDisplay(iso) {
    if (!iso) return '';
    const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return '';
    return `${m[3]}/${m[2]}/${m[1]}`;
  }

  /** Parse user-typed DD/MM/YYYY → YYYY-MM-DD, or null if invalid.
   *  Uses a real Date object to catch impossible dates like 31/02 or 31/04. */
  function parseUserDate(str) {
    str = str.trim().replace(/[^0-9\/]/g, '');
    const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) return null;
    const dN = parseInt(m[1]), moN = parseInt(m[2]), yN = parseInt(m[3]);
    if (moN < 1 || moN > 12 || dN < 1 || dN > 31 || yN < 2000) return null;
    // Verify the date actually exists (e.g. rejects 31/02, 31/04, etc.)
    const check = new Date(yN, moN - 1, dN);
    if (check.getFullYear() !== yN || check.getMonth() !== moN - 1 || check.getDate() !== dN) return null;
    const d  = String(dN).padStart(2, '0');
    const mo = String(moN).padStart(2, '0');
    return `${yN}-${mo}-${d}`;
  }

  /** Auto-insert slashes as user types in the date field — only digits allowed */
  function onDueInput(inp) {
    // Strip everything except digits (no letters, no special chars)
    let v = inp.value.replace(/[^0-9]/g, '');
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5);
    if (v.length > 10) v = v.slice(0,10);
    inp.value = v;
    // Clear error state as the user edits
    inp.classList.remove('inp-error');
    const hint = document.getElementById('due-hint');
    if (!hint) return;
    if (!v) { hint.textContent = ''; hint.className = 'date-hint'; return; }
    const parsed = parseUserDate(v);
    if (parsed) {
      const parts  = v.split('/');
      const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      const mIdx   = parseInt(parts[1]) - 1;
      hint.textContent = `${parts[0]} de ${months[mIdx]||'?'} de ${parts[2]}`;
      hint.className = 'date-hint ok';
    } else if (v.length >= 8) {
      hint.textContent = 'Fecha inválida — usá DD/MM/AAAA';
      hint.className = 'date-hint err';
    } else {
      hint.textContent = '';
      hint.className = 'date-hint';
    }
  }

  /** Parse YYYY-MM-DD → Date set to end of day (avoids UTC off-by-one) */
  function parseLocalDate(iso) {
    if (!iso) return null;
    const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]), 23, 59, 59);
  }

  function fmtDate(iso) { return isoToDisplay(iso); }

  function fmtCreatedAt(ts) {
    if (!ts || Number(ts) <= 0) return '';
    const d = new Date(Number(ts));
    if (isNaN(d.getTime())) return '';
    const day   = String(d.getDate()).padStart(2, '0');
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const year  = d.getFullYear();
    return `${day}/${month}/${year}`;
  }

  // ─── UTILITIES ─────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  // ─── API ───────────────────────────────────────────────────────────────────
  async function api(params) {
    const url = new URL(API);
    params.key = SECRET;
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
    try {
      return await (await fetch(url.toString())).json();
    } catch (e) {
      return { error: e.message };
    }
  }

  // ─── AUTH ──────────────────────────────────────────────────────────────────
  function doLogin() {
    const v = document.getElementById('key-inp').value;
    if (v === SECRET) {
      localStorage.setItem(LKEY, v);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').classList.add('visible');
      init();
    } else {
      const err = document.getElementById('login-error');
      const inp = document.getElementById('key-inp');
      err.classList.add('show');
      inp.style.borderColor = 'var(--red)';
      setTimeout(() => {
        err.classList.remove('show');
        inp.style.borderColor = '';
      }, 2500);
    }
  }

  function doLogout() {
    localStorage.removeItem(LKEY);
    location.reload();
  }

  // ─── INIT ──────────────────────────────────────────────────────────────────
  async function init() {
    // Fix #4 (Duck): resetear estado del glass indicator en cada init,
    // por si el usuario hizo logout + login sin recargar la pestaña.
    lgInitDone   = false;
    lgCurrentBtn = null;

    loadCatColors();
    const st = localStorage.getItem(TKEY);
    if (st) todayIds = new Set(JSON.parse(st));
    const lo = localStorage.getItem(LORDER_KEY);
    if (lo) {
      try { listOrder = JSON.parse(lo); } catch (e) { listOrder = []; }
    }
    document.getElementById('view-container').innerHTML =
      '<div class="loading-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span class="loading-label">Cargando tareas…</span></div>';
    const result = await api({ action: 'getAll' });
    const cats   = result.categories;
    const tks    = result.tasks;
    if (Array.isArray(cats)) {
      categories = cats;
      categories.forEach(c => assignCatColor(c));
      syncListOrder();
    }
    if (Array.isArray(tks)) {
      tasks = tks.map(t => ({ ...t, due: normalizeToISO(t.due) }));

      // Purge todayIds: remove any IDs that no longer exist in the tasks list.
      // This prevents deleted tasks (especially overdue ones) from reappearing
      // in "Tareas de hoy" after a page reload, since checkOverdue() would
      // otherwise re-add them from a stale localStorage entry.
      const existingIds = new Set(tasks.map(t => t.id));
      todayIds.forEach(id => { if (!existingIds.has(id)) todayIds.delete(id); });
      saveToday();

      checkOverdue();
    }
    updateStats();
    renderCatBar();
    renderView();
    // Fix #2 (Duck): arrancar el observer de resize una vez que el DOM está listo
    lgStartObserving();
  }

  function syncListOrder() {
    listOrder = listOrder.filter(c => categories.includes(c));
    categories.forEach(c => { if (!listOrder.includes(c)) listOrder.push(c); });
    localStorage.setItem(LORDER_KEY, JSON.stringify(listOrder));
  }

  // ─── OVERDUE ───────────────────────────────────────────────────────────────
  function checkOverdue() {
    const now = new Date();
    tasks.forEach(t => {
      const d = parseLocalDate(t.due);
      if (d && !t.done && d < now) todayIds.add(t.id);
    });
    saveToday();
  }

  function saveToday() {
    localStorage.setItem(TKEY, JSON.stringify([...todayIds]));
  }

  function isOverdue(t) {
    const d = parseLocalDate(t.due);
    return !!(d && !t.done && d < new Date());
  }

  function isSoonDue(t) {
    if (!t.due || t.done) return false;
    const d = parseLocalDate(t.due);
    if (!d) return false;
    const now = new Date();
    if (d < now) return false;
    const twoDaysFromNow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 2, 23, 59, 59);
    return d <= twoDaysFromNow;
  }

  // ─── STATS ─────────────────────────────────────────────────────────────────
  function updateStats() {
    const active = tasks.filter(t => !t.done);
    document.getElementById('s-total').textContent = active.length;
    document.getElementById('s-pend').textContent  = active.filter(t => !isOverdue(t)).length;
    document.getElementById('s-soon').textContent  = active.filter(t => isSoonDue(t)).length;
    document.getElementById('s-over').textContent  = active.filter(t => isOverdue(t)).length;
  }

  // ─── CATEGORY BAR ──────────────────────────────────────────────────────────
  function renderCatBar() {
    syncListOrder();
    const todayCount = tasks.filter(t => todayIds.has(t.id) && !t.done).length;
    let h = `<button class="cat-btn ${currentCat==='today'?'active':''}" data-cat-action="today">Tareas de hoy <span class="cat-count">${todayCount}</span></button>`;
    listOrder.forEach((c, i) => {
      const n      = tasks.filter(t => t.category===c && !t.done && !todayIds.has(t.id)).length;
      const col    = getCatColor(c);
      const isActive = currentCat === c;
      // Cuando está activo, NO aplicamos background inline — el glass indicator
      // lo reemplaza visualmente. Solo conservamos color de texto y borde.
      // Agregamos clase 'active' para que lgSyncWithActiveBtn pueda encontrarlo.
      const style  = isActive
        ? `border-color:${col.border};color:${col.text};font-weight:500;`
        : `border-color:${col.border};color:${col.text};`;
      const dragOver = catDragOverIdx === i ? 'border-left:3px solid var(--accent);' : '';
      h += `<button class="cat-btn ${isActive ? 'active' : ''}" style="${style}${dragOver}" draggable="true" data-cat="${esc(c)}" data-idx="${i}">${esc(c)} <span class="cat-count">${n}</span></button>`;
    });
    h += `<button class="new-cat-btn" data-cat-action="new">+ Lista</button>`;
    h += `<button class="global-search-btn" id="global-search-toggle" title="Búsqueda global">⌕</button>`;
    document.getElementById('cat-bar').innerHTML = h;

    // Drag events for category reordering
    document.querySelectorAll('#cat-bar .cat-btn[data-idx]').forEach(btn => {
      btn.addEventListener('dragstart', e => {
        catDragIdx = parseInt(btn.dataset.idx);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', catDragIdx);
        btn.style.opacity = '0.4';

        // Fix #3 (Duck): matar animación GSAP en curso antes del drag.
        // renderCatBar() destruye y recrea los nodos del cat-bar, así que
        // cualquier tween activo sobre lg-indicator quedaría apuntando a
        // posiciones de botones que ya no existen en el DOM.
        if (typeof gsap !== 'undefined') gsap.killTweensOf(lgIndicator);
        lgInitDone   = false;
        lgCurrentBtn = null;
      });
      btn.addEventListener('dragend', () => {
        btn.style.opacity = '';
        catDragIdx     = null;
        catDragOverIdx = null;
        // lgInitDone ya es false desde dragstart — renderCatBar llamará
        // lgSyncWithActiveBtn vía rAF, que posicionará sin animación.
        renderCatBar();
      });
      btn.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const targetIdx = parseInt(btn.dataset.idx);
        if (catDragIdx !== null && targetIdx !== catDragIdx && catDragOverIdx !== targetIdx) {
          catDragOverIdx = targetIdx;
          _renderCatBarIndicator();
        }
      });
      btn.addEventListener('dragleave', e => {
        if (!e.relatedTarget || !e.relatedTarget.closest('#cat-bar')) {
          catDragOverIdx = null;
          _renderCatBarIndicator();
        }
      });
      btn.addEventListener('drop', e => {
        e.preventDefault();
        const srcIdx = parseInt(e.dataTransfer.getData('text/plain'));
        const tgtIdx = parseInt(btn.dataset.idx);
        if (!isNaN(srcIdx) && !isNaN(tgtIdx) && srcIdx !== tgtIdx) {
          const [moved] = listOrder.splice(srcIdx, 1);
          listOrder.splice(tgtIdx, 0, moved);
          localStorage.setItem(LORDER_KEY, JSON.stringify(listOrder));
        }
        catDragIdx = null;
        catDragOverIdx = null;
        renderCatBar();
      });
    });

    // Sincronizar liquid glass indicator con el botón activo.
    // Doble rAF: el primero permite que el browser procese el nuevo DOM,
    // el segundo espera a que el layout (flexbox, fuentes) esté resuelto.
    requestAnimationFrame(() => requestAnimationFrame(lgSyncWithActiveBtn));
  }

  /** Lightweight visual update during drag — only updates border styles */
  function _renderCatBarIndicator() {
    document.querySelectorAll('#cat-bar .cat-btn[data-idx]').forEach(btn => {
      const i = parseInt(btn.dataset.idx);
      btn.style.borderLeft = catDragOverIdx === i ? '3px solid var(--accent)' : '';
    });
  }

  let _switchCatTimer = null;
  function switchCat(c) {
    currentCat = c;
    listSearchQuery = '';
    // Matar tweens GSAP en curso antes de que renderCatBar destruya los nodos.
    // NO tocamos lgInitDone ni lgCurrentBtn desde acá — esas variables viven
    // en el scope de la sección liquid glass (más abajo) y switchCat no tiene
    // acceso correcto a ellas. El reposicionamiento lo maneja lgSyncWithActiveBtn
    // vía el doble rAF que dispara renderCatBar.
    if (typeof gsap !== 'undefined') {
      const ind = document.getElementById('lg-indicator');
      if (ind) { gsap.killTweensOf(ind); gsap.set(ind, { scaleX: 1, scaleY: 1 }); }
    }
    renderCatBar();
    const vc = document.getElementById('view-container');
    if (!vc) { renderView(); return; }
    // Cancelar transición anterior si llega una nueva antes de que termine
    if (_switchCatTimer) { clearTimeout(_switchCatTimer); _switchCatTimer = null; }
    vc.classList.add('view-leaving');
    _switchCatTimer = setTimeout(() => {
      _switchCatTimer = null;
      vc.classList.remove('view-leaving');
      renderView();
    }, 130);
  }

  // ─── VIEW ──────────────────────────────────────────────────────────────────
  function renderView() {
    const vc = document.getElementById('view-container');
    let list;
    if (currentCat === 'today') {
      list = tasks
        .filter(t => todayIds.has(t.id))
        .sort((a, b) => {
          if (a.done !== b.done) return a.done ? 1 : -1;
          return (a.order || 0) - (b.order || 0);
        });
      vc.innerHTML = `
        <div class="view-header">
          <div class="view-title today-title">Tareas de hoy</div>
          <div class="view-actions">
            <div class="search-wrap">
              <span class="search-icon">⌕</span>
              <input class="search-inp" type="text" id="search-inp" placeholder="Buscar... (/)" title="Buscar en esta lista (/)" value="${esc(listSearchQuery)}" />
            </div>
          </div>
        </div>
        <div class="tasks-list" id="tasks-list"></div>`;
    } else {
      list = tasks
        .filter(t => t.category === currentCat && !todayIds.has(t.id))
        .sort((a, b) => {
          if (a.done !== b.done) return a.done ? 1 : -1;
          return (a.order || 0) - (b.order || 0);
        });
      const hasPending = tasks.some(t => t.category === currentCat && !t.done);
      vc.innerHTML = `
        <div class="view-header">
          <div class="view-title">${esc(currentCat)}</div>
          <div class="view-actions">
            <div class="search-wrap">
              <span class="search-icon">⌕</span>
              <input class="search-inp" type="text" id="search-inp" placeholder="Buscar... (/)" title="Buscar en esta lista (/)" value="${esc(listSearchQuery)}" />
            </div>
            <button class="icon-btn" data-action="rename-cat" title="Renombrar lista" style="opacity:1;color:var(--text3);font-size:0.875rem;padding:6px 8px;">✎</button>
            <button class="new-task-btn" data-action="new-task" title="Nueva tarea (N)">+ Nueva</button>
          </div>
        </div>
        <div class="tasks-list" id="tasks-list"></div>
        <div class="del-cat-zone">
          ${tasks.some(t => t.category === currentCat && t.done) && !listSearchQuery.trim()
            ? `<button class="del-done-btn" data-action="del-done">Eliminar tareas completadas</button>`
            : ''}
          <button class="del-cat-btn" data-action="del-cat" ${hasPending ? 'disabled' : ''}>Eliminar lista "${esc(currentCat)}"</button>
          ${hasPending ? '<p class="del-cat-note">Eliminá todas las tareas pendientes para poder borrar esta lista.</p>' : ''}
        </div>`;
    }
    const inp = document.getElementById('search-inp');
    if (inp) {
      inp.addEventListener('input', e => { listSearchQuery = e.target.value; applyListSearch(); });
    }
    applyListSearch(list);
  }

  function applyListSearch(baseList) {
    const listEl = document.getElementById('tasks-list');
    if (!listEl) return;
    if (!baseList) {
      baseList = currentCat === 'today'
        ? tasks
            .filter(t => todayIds.has(t.id))
            .sort((a, b) => { if (a.done !== b.done) return a.done ? 1 : -1; return (a.order||0) - (b.order||0); })
        : tasks
            .filter(t => t.category === currentCat && !todayIds.has(t.id))
            .sort((a, b) => { if (a.done !== b.done) return a.done ? 1 : -1; return (a.order||0) - (b.order||0); });
    }
    const q        = listSearchQuery.toLowerCase().trim();
    const filtered = q
      ? baseList.filter(t => t.title.toLowerCase().includes(q) || (t.desc||'').toLowerCase().includes(q))
      : baseList;
    if (q && !filtered.length) {
      listEl.innerHTML = `<div class="empty"><div class="empty-icon">⌕</div><p>No se encontraron tareas para "<strong>${esc(listSearchQuery)}</strong>".</p></div>`;
      return;
    }
    populateList(filtered, currentCat);
  }

  function populateList(list, viewCat) {
    const el = document.getElementById('tasks-list');
    if (!el) return;
    if (!list.length) {
      if (viewCat === 'today') {
        el.innerHTML = `<div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="26" cy="26" r="9" stroke="currentColor" stroke-width="1.8" fill="none"/>
  <line x1="26" y1="8" x2="26" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="39" x2="26" y2="44" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8" y1="26" x2="13" y2="26" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="39" y1="26" x2="44" y2="26" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14.5" y1="14.5" x2="18.1" y2="18.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="33.9" y1="33.9" x2="37.5" y2="37.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="37.5" y1="14.5" x2="33.9" y2="18.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="18.1" y1="33.9" x2="14.5" y2="37.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
</svg></div>
          <p>Todo libre por hoy.</p>
          <span class="empty-hint">Agregá tareas desde cada lista con ☀</span>
        </div>`;
      } else {
        el.innerHTML = `<div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="14" width="36" height="28" rx="4" stroke="currentColor" stroke-width="1.8" fill="none"/>
  <line x1="8" y1="22" x2="44" y2="22" stroke="currentColor" stroke-width="1.8"/>
  <line x1="16" y1="30" x2="28" y2="30" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16" y1="35" x2="24" y2="35" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="38" cy="14" r="7" fill="var(--bg)" stroke="currentColor" stroke-width="1.6"/>
  <path d="M35 14l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
          <p>Esta lista está vacía.</p>
          <span class="empty-hint">Usá + Nueva para agregar una tarea</span>
        </div>`;
      }
      return;
    }
    el.innerHTML = list.map(t => taskHTML(t, viewCat)).join('');
    requestAnimationFrame(() => {
      const cards = el.querySelectorAll('.task-card');
      if (typeof gsap !== 'undefined') {
        // Stagger con física spring real usando GSAP
        gsap.fromTo(cards,
          { opacity: 0, y: 16, scale: 0.97 },
          {
            opacity: 1,
            y: 0,
            scale: 1,
            duration: 0.42,
            ease: 'back.out(1.4)',
            stagger: { each: 0.048, ease: 'power2.out' },
            clearProps: 'transform,opacity'  // limpia inline styles al terminar para no interferir con hover
          }
        );
      } else {
        // Fallback sin GSAP: comportamiento anterior
        cards.forEach((c, i) => {
          c.classList.add('anim-in');
          c.style.animationDelay = (i * 18) + 'ms';
        });
      }
      setupDrag(el, viewCat);
      setupSwipe(el, viewCat);
    });
  }

  // ─── SWIPE TO COMPLETE / DELETE ────────────────────────────────────────────
  function setupSwipe(listEl, viewCat) {
    // Solo en dispositivos touch
    if (!('ontouchstart' in window)) return;

    const THRESHOLD_START  = 8;   // px mínimos para considerar que es un swipe (no un tap)
    const THRESHOLD_ACTION = 72;  // px para confirmar la acción
    const RESISTANCE       = 0.45; // factor de resistencia — el card se mueve menos que el dedo

    listEl.querySelectorAll('.swipe-wrap').forEach(wrap => {
      const card      = wrap.querySelector('.task-card');
      const bgRight   = wrap.querySelector('.swipe-bg.swipe-right');
      const bgLeft    = wrap.querySelector('.swipe-bg.swipe-left');
      if (!card) return;

      const id        = card.dataset.id;
      let startX      = 0;
      let startY      = 0;
      let currentX    = 0;
      let isSwiping   = false;
      let isLocked    = false; // true si ya se determinó que es scroll vertical

      card.addEventListener('touchstart', e => {
        // No iniciar swipe en tareas completadas
        const t = tasks.find(x => x.id === id);
        if (t && t.done) return;

        startX    = e.touches[0].clientX;
        startY    = e.touches[0].clientY;
        currentX  = 0;
        isSwiping = false;
        isLocked  = false;
      }, { passive: true });

      card.addEventListener('touchmove', e => {
        if (isLocked) return;

        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;

        // Si el movimiento vertical supera al horizontal antes del umbral → es scroll, lo ignoramos
        if (!isSwiping && Math.abs(dy) > Math.abs(dx)) {
          isLocked = true;
          return;
        }

        // Activar swipe mode una vez superado el umbral horizontal
        if (!isSwiping && Math.abs(dx) < THRESHOLD_START) return;

        isSwiping = true;
        e.preventDefault(); // bloquear scroll mientras se swipea

        currentX = dx * RESISTANCE;
        const absDx = Math.abs(dx);

        // Mover la card
        card.classList.add('swiping');
        card.style.transform = `translateX(${currentX}px)`;

        // Mostrar fondo correcto y ocultar el otro
        const progress = Math.min(absDx / THRESHOLD_ACTION, 1);
        if (dx > 0) {
          bgRight.style.opacity = String(progress * 0.9);
          bgLeft.style.opacity  = '0';
        } else {
          bgLeft.style.opacity  = String(progress * 0.9);
          bgRight.style.opacity = '0';
        }

        // Marcar si superó el umbral de confirmación
        wrap.classList.toggle('swipe-confirmed', absDx >= THRESHOLD_ACTION);
      }, { passive: false });

      card.addEventListener('touchend', () => {
        if (!isSwiping) return;
        isSwiping = false;

        const absDx = Math.abs(currentX / RESISTANCE); // volver a dx real
        const confirmed = absDx >= THRESHOLD_ACTION;
        const direction = currentX > 0 ? 'right' : 'left';

        // Resetear estado visual siempre
        card.classList.remove('swiping');
        wrap.classList.remove('swipe-confirmed');
        bgRight.style.opacity = '0';
        bgLeft.style.opacity  = '0';

        if (confirmed) {
          if (direction === 'right') {
            // Swipe derecha → completar
            card.style.transform = `translateX(${window.innerWidth}px)`;
            card.style.transition = 'transform .28s cubic-bezier(.4, 0, .2, 1), opacity .28s';
            card.style.opacity = '0';
            setTimeout(() => {
              card.style.transform = '';
              card.style.transition = '';
              card.style.opacity = '';
              toggleDone(id, viewCat);
            }, 260);
          } else {
            // Swipe izquierda → eliminar
            card.style.transform = `translateX(-${window.innerWidth}px)`;
            card.style.transition = 'transform .28s cubic-bezier(.4, 0, .2, 1), opacity .28s';
            card.style.opacity = '0';
            setTimeout(() => {
              card.style.transform = '';
              card.style.transition = '';
              card.style.opacity = '';
              doDelete(id, true);
            }, 260);
          }
        } else {
          // No superó el umbral → snap back con spring
          card.style.transition = 'transform .32s cubic-bezier(.34, 1.56, .64, 1)';
          card.style.transform  = 'translateX(0)';
          setTimeout(() => {
            card.style.transition = '';
            card.style.transform  = '';
          }, 340);
        }
      });
    });
  }

  function taskHTML(t, viewCat) {
    const over   = isOverdue(t);
    const locked = over && todayIds.has(t.id);
    const catCol = getCatColor(t.category || '');
    let meta = '';
    if (viewCat === 'today') meta += `<span class="task-cat-badge" style="background:${catCol.bg};border-color:${catCol.border};color:${catCol.text}">${esc(t.category||'')}</span>`;
    if (t.due) meta += `<span class="date-chip ${over?'overdue':''}">${over?'⚠ ':''}${fmtDate(t.due)}</span>`;
    if (!over && isSoonDue(t)) meta += `<span class="soon-chip">por vencer</span>`;
    if (t.createdAt) meta += `<span class="created-chip" title="Creada el ${fmtCreatedAt(t.createdAt)}">+ ${fmtCreatedAt(t.createdAt)}</span>`;
    let actions = '';
    if (viewCat === 'today') {
      actions += locked
        ? `<span class="overdue-lock" title="Tarea vencida">vencida</span>`
        : `<button class="icon-btn rm-today" data-action="rm-today" data-id="${t.id}" title="Quitar de hoy">↩</button>`;
    } else {
      if (!todayIds.has(t.id)) actions += `<button class="icon-btn add-today" data-action="add-today" data-id="${t.id}" title="Agregar a Tareas de hoy">☀</button>`;
    }
    actions += `<button class="icon-btn" data-action="edit" data-id="${t.id}" title="Editar">✎</button>`;
    actions += `<button class="icon-btn del" data-action="del" data-id="${t.id}" title="Eliminar">✕</button>`;
    return `
      <div class="swipe-wrap" id="sw-${t.id}">
        <div class="swipe-bg swipe-right"><span class="swipe-bg-icon">✓</span></div>
        <div class="swipe-bg swipe-left"><span class="swipe-bg-icon">✕</span></div>
        <div class="task-card ${t.done?'done-card':''}" id="tc-${t.id}" data-id="${t.id}" data-viewcat="${viewCat}" data-overdue="${over}" draggable="true">
          <div class="drag-handle">⠿</div>
          <div class="check-wrap">
            <button class="check-btn ${t.done?'checked':''}" data-action="toggle-done" data-id="${t.id}" data-viewcat="${viewCat}">
              <svg viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <div class="task-body">
            <div class="task-title${t.done?' struck':''}">${esc(t.title)}</div>
            ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
            <div class="task-meta">${meta}</div>
          </div>
          <div class="task-actions">${actions}</div>
        </div>
      </div>`;
  }

  // ─── TODAY ─────────────────────────────────────────────────────────────────
  function addToday(id) {
    todayIds.add(id);
    saveToday();
    renderCatBar();
    renderView();
    showToast('Agregada a Tareas de hoy');
  }

  function removeToday(id) {
    const t = tasks.find(x => x.id === id);
    if (t && isOverdue(t)) { showToast('Las tareas vencidas no se pueden quitar'); return; }
    todayIds.delete(id);
    saveToday();
    renderCatBar();
    renderView();
    showToast('Quitada de Tareas de hoy');
  }

  // ─── TOGGLE DONE ───────────────────────────────────────────────────────────
  async function toggleDone(id, viewCat) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const card    = document.getElementById('tc-' + id);
    const titleEl = card ? card.querySelector('.task-title') : null;
    if (!t.done) {
      t.done = true;
      navigator.vibrate?.(10);  // pulso corto al completar
      if (card) {
        card.classList.add('anim-complete');
        spawnConfetti(card);
        playCompleteSound();
        if (titleEl) {
          titleEl.classList.remove('struck', 'unstriking');
          titleEl.classList.add('striking');
        }
        await sleep(650);
        if (titleEl) {
          titleEl.classList.remove('striking');
          titleEl.classList.add('struck');
        }
      }
      if (viewCat === 'today') { todayIds.delete(id); saveToday(); }
    } else {
      t.done = false;
      if (card) {
        if (titleEl) {
          titleEl.classList.remove('striking', 'struck');
          titleEl.classList.add('unstriking');
        }
        card.classList.add('anim-uncomplete');
        await sleep(320);
      }
      if (isOverdue(t)) { todayIds.add(id); saveToday(); }
    }
    updateStats();
    renderCatBar();
    renderView();
    api({ action: 'updateTask', task: JSON.stringify(t) });
  }

  // ─── AUDIO & VISUAL FEEDBACK ───────────────────────────────────────────────
  function playCompleteSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      [[523, 0, 0.14], [659, 0.09, 0.14], [784, 0.18, 0.22]].forEach(([freq, delay, dur]) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + delay);
        gain.gain.setValueAtTime(0, now + delay);
        gain.gain.linearRampToValueAtTime(0.15, now + delay + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, now + delay + dur);
        osc.start(now + delay);
        osc.stop(now + delay + dur + 0.05);
      });
    } catch (e) {}
  }

  function spawnConfetti(card) {
    const r      = card.getBoundingClientRect();
    const cx     = r.left + 24;
    const cy     = r.top + r.height / 2;
    const colors = ['#c8f060','#40d0a0','#f0a030','#ff8080','#7ab4ff','#ffffff'];
    const count  = 14;
    for (let i = 0; i < count; i++) {
      const d        = document.createElement('div');
      const angle    = (Math.PI * 2 / count) * i + (Math.random() - .5) * .6;
      const speed    = 28 + Math.random() * 44;
      const tx       = Math.cos(angle) * speed;
      const ty       = Math.sin(angle) * speed - 18 - Math.random() * 20;
      const rot      = (Math.random() - .5) * 540;
      const size     = 4 + Math.random() * 5;
      const isCircle = Math.random() > 0.4;
      const delay    = i * 22;
      d.style.cssText = `position:fixed;width:${size}px;height:${size}px;border-radius:${isCircle?'50%':'2px'};background:${colors[i%colors.length]};left:${cx+Math.random()*14-7}px;top:${cy}px;pointer-events:none;z-index:9999;--tx:${tx}px;--ty:${ty}px;--r:${rot}deg;animation:confettiPop .75s cubic-bezier(.2,.8,.3,1) both;animation-delay:${delay}ms;opacity:1`;
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 900 + delay);
    }
    const checkBtn = card.querySelector('.check-btn');
    if (checkBtn) {
      const ripple = document.createElement('div');
      const br     = checkBtn.getBoundingClientRect();
      ripple.style.cssText = `position:fixed;left:${br.left+br.width/2}px;top:${br.top+br.height/2}px;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:2px solid var(--accent);pointer-events:none;z-index:9999;animation:rippleOut .5s ease both`;
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }
  }

  // ─── DRAG & DROP (tasks) ───────────────────────────────────────────────────
  function setupDrag(listEl, cat) {
    listEl.querySelectorAll('.task-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        dragSrcId = card.dataset.id;
        setTimeout(() => card.classList.add('dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
        // Pausar el liquid glass durante el drag de tareas.
        if (typeof gsap !== 'undefined') {
          const ind = document.getElementById('lg-indicator');
          if (ind) { gsap.killTweensOf(ind); gsap.set(ind, { scaleX: 1, scaleY: 1 }); }
        }
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        listEl.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
        // Resincronizar el liquid glass al soltar la tarea.
        // Doble rAF para esperar que el DOM y el layout estén estables.
        requestAnimationFrame(() => requestAnimationFrame(() => {
          if (typeof lgSyncWithActiveBtn !== 'undefined') lgSyncWithActiveBtn();
        }));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        if (card.dataset.id === dragSrcId) return;
        listEl.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
        card.classList.add('drag-over');
      });
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (dragSrcId && card.dataset.id !== dragSrcId) reorder(dragSrcId, card.dataset.id, cat);
      });
    });
  }

  function reorder(srcId, tgtId, cat) {
    let list = cat === 'today'
      ? tasks.filter(t => todayIds.has(t.id)).sort((a, b) => (a.order||0) - (b.order||0))
      : tasks.filter(t => t.category === cat && !todayIds.has(t.id)).sort((a, b) => (a.order||0) - (b.order||0));
    const si = list.findIndex(t => t.id === srcId);
    const ti = list.findIndex(t => t.id === tgtId);
    if (si === -1 || ti === -1) return;
    const [moved] = list.splice(si, 1);
    list.splice(ti, 0, moved);
    list.forEach((t, i) => { t.order = i; });
    renderCatBar();
    renderView();
    list.forEach(t => api({ action: 'updateTask', task: JSON.stringify(t) }));
  }

  async function saveTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { showToast('El título es obligatorio'); return; }
    const category = document.getElementById('f-category').value;
    if (!category) { showToast('Seleccioná una lista'); return; }
    const dueRaw = document.getElementById('f-due').value.trim();
    let dueISO = '';
    if (dueRaw) {
      dueISO = parseUserDate(dueRaw);
      if (dueISO === null) {
        const dueInp = document.getElementById('f-due');
        const hint   = document.getElementById('due-hint');
        dueInp.classList.add('inp-error');
        if (hint) { hint.textContent = 'Fecha inválida — usá DD/MM/AAAA'; hint.className = 'date-hint err'; }
        dueInp.focus();
        return;
      }
    }

    // Disable save button and show loading state while API call is in flight
    const saveBtn = document.getElementById('task-save-btn');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Guardando…'; }

    const currentEditingId = editingId;
    const existing  = currentEditingId ? tasks.find(t => t.id === currentEditingId) : null;
    const maxOrder  = tasks.filter(t => t.category === category).reduce((m, t) => Math.max(m, t.order||0), -1);
    const task = {
      id:        currentEditingId || (Date.now().toString(36) + Math.random().toString(36).slice(2,5)),
      title,
      desc:      document.getElementById('f-desc').value.trim(),
      due:       dueISO,
      category,
      done:      existing ? existing.done : false,
      createdAt: existing ? existing.createdAt : Date.now(),
      order:     existing ? existing.order : maxOrder + 1,
    };

    const result = await api({ action: currentEditingId ? 'updateTask' : 'saveTask', task: JSON.stringify(task) });

    // Re-enable button regardless of outcome (modal may already be closed by Escape, but guard anyway)
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Guardar'; }

    if (result && result.error) {
      showToast('Error al guardar. Revisá tu conexión.');
      return;
    }

    closeTaskModal();
    if (currentEditingId) {
      tasks = tasks.map(t => t.id === currentEditingId ? task : t);
      showToast('Tarea actualizada');
    } else {
      tasks.unshift(task);
      showToast('Tarea creada');
    }
    checkOverdue();
    updateStats();
    renderCatBar();
    renderView();
  }

  function editTask(id) {
    const t = tasks.find(x => x.id === id);
    if (t) openTaskModal(t);
  }

  // Undo buffer for deletions — holds the last deleted task for 4 seconds
  let _undoBuffer = null;
  let _undoTimer  = null;

  async function doDelete(id, skipAnim = false) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;

    navigator.vibrate?.([6, 40, 6]);  // doble pulso al eliminar

    // Animate card out — skipped if swipe already handled the exit animation
    if (!skipAnim) {
      const card = document.getElementById('tc-' + id);
      if (card) { card.classList.add('anim-out'); await sleep(220); }
    }

    // Remove from state
    tasks = tasks.filter(x => x.id !== id);
    todayIds.delete(id);
    saveToday();
    updateStats();
    renderCatBar();
    renderView();

    // Show undo toast first (commitPendingUndo inside will clear any previous buffer),
    // then set the new buffer — order matters to avoid self-clearing the new entry
    if (_undoTimer) clearTimeout(_undoTimer);
    showToastUndo(`Tarea eliminada`, () => undoDelete());
    _undoBuffer = { ...t };

    // After 4 s, commit deletion to API and clear buffer
    _undoTimer = setTimeout(() => {
      if (_undoBuffer && _undoBuffer.id === id) {
        api({ action: 'deleteTask', id });
        _undoBuffer = null;
      }
    }, 4000);
  }

  function undoDelete() {
    if (!_undoBuffer) return;
    clearTimeout(_undoTimer);
    const t = { ..._undoBuffer };
    _undoBuffer = null;
    tasks.unshift(t);
    if (t.due) {
      const d = parseLocalDate(t.due);
      if (d && !t.done && d < new Date()) todayIds.add(t.id);
    }
    saveToday();
    updateStats();
    renderCatBar();
    renderView();
    showToast('Tarea restaurada');
  }

    showToastConfirm(
      `¿Eliminar ${completed.length} tarea${completed.length > 1 ? 's' : ''} completada${completed.length > 1 ? 's' : ''}?`,

    showToastConfirm(`¿Eliminar la lista "${cat}"?`, () => {

      categories = categories.filter(c => c !== cat);
      listOrder  = listOrder.filter(c => c !== cat);

      renderView();

  function closeRenameCatModal() {

  }

  async function saveRenameCategory() {
    const newName = document.getElementById('rename-cat-inp').value.trim();
    if (!newName) { showToast('Poné un nombre'); return; }
    if (newName === renamingCat) { closeRenameCatModal(); return; }
    if (categories.includes(newName)) { showToast('Ya existe una lista con ese nombre'); return; }
    const oldName = renamingCat;
    categories = categories.map(c => c === oldName ? newName : c);
    listOrder  = listOrder.map(c => c === oldName ? newName : c);
    localStorage.setItem(LORDER_KEY, JSON.stringify(listOrder));
    tasks.forEach(t => { if (t.category === oldName) t.category = newName; });
    if (catColors[oldName]) { catColors[newName] = catColors[oldName]; delete catColors[oldName]; saveCatColors(); }
    if (currentCat === oldName) currentCat = newName;
    closeRenameCatModal();
    api({ action: 'renameCategory', oldName, newName });
    tasks.filter(t => t.category === newName).forEach(t => api({ action: 'updateTask', task: JSON.stringify(t) }));
    updateStats();
    renderCatBar();
    renderView();
    showToast('Lista renombrada');
  }

  // ─── MINI CALENDAR ─────────────────────────────────────────────────────────
  let calOpen      = false;
  let calViewYear  = null;
  let calViewMonth = null; // 0-based

  const CAL_MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const CAL_DOWS   = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];

  function openCalendar() {
    calOpen = true;
    const btn = document.getElementById('cal-toggle-btn');
    if (btn) btn.classList.add('active');

    // Seed view from current field value, otherwise today
    const raw    = document.getElementById('f-due')?.value || '';
    const parsed = parseUserDate(raw);
    const seed   = parsed ? new Date(parsed + 'T12:00:00') : new Date();
    calViewYear  = seed.getFullYear();
    calViewMonth = seed.getMonth();

    renderCalendar();
  }

  function closeCalendar() {
    calOpen = false;
    const btn = document.getElementById('cal-toggle-btn');
    if (btn) btn.classList.remove('active');
    const wrap = document.getElementById('cal-popup-wrap');
    if (wrap) wrap.innerHTML = '';
  }

  function toggleCalendar() {
    calOpen ? closeCalendar() : openCalendar();
  }

  function renderCalendar() {
    const wrap = document.getElementById('cal-popup-wrap');
    if (!wrap || !calOpen) return;

    const today    = new Date();
    const todayY   = today.getFullYear();
    const todayM   = today.getMonth();
    const todayD   = today.getDate();

    // Get currently selected date from the text input
    const raw      = document.getElementById('f-due')?.value || '';
    const parsed   = parseUserDate(raw);
    let selY = null, selM = null, selD = null;
    if (parsed) {
      const selDate = new Date(parsed + 'T12:00:00');
      selY = selDate.getFullYear(); selM = selDate.getMonth(); selD = selDate.getDate();
    }

    // First day of month and total days
    const firstDow = new Date(calViewYear, calViewMonth, 1).getDay(); // 0=Sun
    // Convert to Mon-first (Mon=0 … Sun=6)
    const startOffset = (firstDow === 0) ? 6 : firstDow - 1;
    const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();

    // Build day cells
    let dayCells = '';
    for (let i = 0; i < startOffset; i++) {
      dayCells += `<div class="cal-day empty"></div>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday    = d === todayD && calViewMonth === todayM && calViewYear === todayY;
      const isSelected = d === selD   && calViewMonth === selM   && calViewYear === selY;
      const isPast     = new Date(calViewYear, calViewMonth, d) < new Date(todayY, todayM, todayD);
      let cls = 'cal-day';
      if (isToday)    cls += ' today-marker';
      if (isSelected) cls += ' selected';
      if (isPast)     cls += ' past';
      dayCells += `<div class="${cls}" data-cal-day="${d}">${d}</div>`;
    }

    wrap.innerHTML = `
      <div class="cal-popup" id="cal-popup">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="cal-prev">‹</button>
          <span class="cal-month-label">${CAL_MONTHS[calViewMonth]} ${calViewYear}</span>
          <button class="cal-nav-btn" id="cal-next">›</button>
        </div>
        <div class="cal-grid">
          ${CAL_DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('')}
          ${dayCells}
        </div>
      </div>`;

    document.getElementById('cal-prev').addEventListener('click', e => {
      e.stopPropagation();
      calViewMonth--;
      if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
      renderCalendar();
    });

    document.getElementById('cal-next').addEventListener('click', e => {
      e.stopPropagation();
      calViewMonth++;
      if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
      renderCalendar();
    });

    wrap.querySelectorAll('.cal-day[data-cal-day]').forEach(cell => {
      cell.addEventListener('click', e => {
        e.stopPropagation();
        const d  = parseInt(cell.dataset.calDay);
        const mo = String(calViewMonth + 1).padStart(2, '0');
        const dd = String(d).padStart(2, '0');
        const displayVal = `${dd}/${mo}/${calViewYear}`;
        const inp = document.getElementById('f-due');
        if (inp) {
          inp.value = displayVal;
          onDueInput(inp);
        }
        closeCalendar();
      });
    });
  }

  // ─── TOAST ─────────────────────────────────────────────────────────────────
  let _toastTimer = null;

  /**
   * If a delete-with-undo is pending and a new toast is about to replace it,
   * commit the deletion to the API immediately so it isn't lost.
   * Must be called before clearing _toastTimer in any showToast* function.
   */
  function commitPendingUndo() {
    if (_undoBuffer) {
      clearTimeout(_undoTimer);
      api({ action: 'deleteTask', id: _undoBuffer.id });
      _undoBuffer = null;
      _undoTimer  = null;
    }
  }

  function showToast(msg) {
    commitPendingUndo();
    const el = document.getElementById('toast');
    el.innerHTML = `<span>${esc(msg)}</span>`;
    el.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /** Shows a toast with an "Deshacer" button. onUndo is called if user taps it. */
  function showToastUndo(msg, onUndo) {
    commitPendingUndo();
    const el = document.getElementById('toast');
    el.innerHTML = `<span>${esc(msg)}</span><button class="toast-undo-btn" id="toast-undo-btn">Deshacer</button>`;
    el.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    document.getElementById('toast-undo-btn').addEventListener('click', () => {
      el.classList.remove('show');
      clearTimeout(_toastTimer);
      onUndo();
    });
    _toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

  /** Shows a toast with a "Confirmar" button for destructive actions. onConfirm is called if user taps it. */
  function showToastConfirm(msg, onConfirm) {
    commitPendingUndo();
    const el = document.getElementById('toast');
    el.innerHTML = `<span>${esc(msg)}</span><button class="toast-confirm-btn" id="toast-confirm-btn">Confirmar</button>`;
    el.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    document.getElementById('toast-confirm-btn').addEventListener('click', () => {
      el.classList.remove('show');
      clearTimeout(_toastTimer);
      onConfirm();
    });
    // Auto-dismiss after 4s without action = cancelled
    _toastTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }

      </div>
      <div class="global-search-results" id="gs-results" style="margin-top:.75rem"></div>`;

  function highlightMatch(text, q) {
    if (!q) return esc(text);
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return esc(text);
    return esc(text.slice(0, idx))
      + '<mark>' + esc(text.slice(idx, idx + q.length)) + '</mark>'
      + esc(text.slice(idx + q.length));
  }

  function renderGsResults() {
    const el = document.getElementById('gs-results');
    if (!el) return;
    const q  = searchState.query.trim();
    if (!q) { el.innerHTML = `<div class="gsr-empty">Escribí algo para buscar...</div>`; return; }
    const ql = q.toLowerCase();
    const f  = searchState.filter;
    let results = [];
    if (f === 'all' || f === 'lists') {
      listOrder.forEach(c => {
        if (c.toLowerCase().includes(ql)) {
          const n = tasks.filter(t => t.category === c && !t.done).length;
          results.push({
            type: 'Lista',
            name: c,
            sub: `${n} tarea${n!==1?'s':''} pendiente${n!==1?'s':''}`,
            action: () => { switchCat(c); toggleGlobalSearch(); },
            matchIn: 'name',
          });
        }
      });
    }
    if (f === 'all' || f === 'tasks') {
      tasks.forEach(t => {
        if (t.title.toLowerCase().includes(ql)) {
          results.push({
            type: 'Tarea',
            name: t.title,
            sub: t.category + (t.desc ? ' · ' + t.desc.slice(0,60) + (t.desc.length > 60 ? '…' : '') : ''),
            action: () => { switchCat(t.category); toggleGlobalSearch(); },
            matchIn: 'name',
          });
        }
      });
    }
    if (f === 'all' || f === 'desc') {
      tasks.forEach(t => {
        if (!t.desc) return;
        if ((f === 'all' || f === 'tasks') && t.title.toLowerCase().includes(ql)) return;
        if (t.desc.toLowerCase().includes(ql)) {
          results.push({
            type: 'Descripción',
            name: t.title,
            sub: t.desc,
            action: () => { switchCat(t.category); toggleGlobalSearch(); },
            matchIn: 'sub',
          });
        }
      });
    }
    if (!results.length) {
      el.innerHTML = `<div class="gsr-empty">Sin resultados para "<strong>${esc(q)}</strong>".</div>`;
      return;
    }
    el.innerHTML = results.map((r, i) => `
      <div class="gsr-item" data-gsresult="${i}">
        <div class="gsr-type">${esc(r.type)}</div>
        <div class="gsr-name">${r.matchIn === 'name' ? highlightMatch(r.name, q) : esc(r.name)}</div>
        ${r.sub ? `<div class="gsr-sub">${r.matchIn === 'sub' ? highlightMatch(r.sub, q) : esc(r.sub)}</div>` : ''}
      </div>`).join('');
    _gsrActions = results.map(r => r.action);
  }

  // ─── EVENT DELEGATION ──────────────────────────────────────────────────────
  // All click handling in one place using data attributes.
  document.addEventListener('click', e => {
    // Global search toggle — checked first, independently
    if (e.target.closest('#global-search-toggle')) { toggleGlobalSearch(); return; }

    const t = e.target.closest('[data-action], [data-cat-action], [data-gsfilter], [data-gsresult], [data-idx]');
    if (!t) return;

    // Cat bar actions
    if (t.dataset.catAction === 'today') { switchCat('today'); return; }
    if (t.dataset.catAction === 'new')   { openCatModal(); return; }
    if (t.dataset.idx !== undefined && !t.dataset.action) { switchCat(t.dataset.cat); return; }

    // Global search filters
    if (t.dataset.gsfilter) { setGsFilter(t.dataset.gsfilter); return; }

    // Global search results
    if (t.dataset.gsresult !== undefined) {
      if (_gsrActions && _gsrActions[t.dataset.gsresult]) _gsrActions[t.dataset.gsresult]();
      return;
    }

    // View actions
    const action = t.dataset.action;
    const id     = t.dataset.id;

    if (action === 'new-task')    { openTaskModal(); return; }
    if (action === 'rename-cat')  { openRenameCatModal(currentCat); return; }
    if (action === 'del-cat')     { confirmDelCat(currentCat); return; }
    if (action === 'del-done')    { deleteCompletedTasks(currentCat); return; }
    if (action === 'toggle-done') { toggleDone(id, t.dataset.viewcat); return; }
    if (action === 'add-today')   { addToday(id); return; }
    if (action === 'rm-today')    { removeToday(id); return; }
    if (action === 'edit')        { editTask(id); return; }
    if (action === 'del')         { doDelete(id); return; }  // direct delete with undo toast

    // Modal backdrop clicks — ignorar si el mousedown empezó dentro del contenido
    if (_modalMousedownOnContent) return;
    if (t.id === 'task-modal-bg')       { closeTaskModal(); return; }
    if (t.id === 'cat-modal-bg')        { closeCatModal(); return; }
    if (t.id === 'rename-cat-modal-bg') { closeRenameCatModal(); return; }
  });

  // ─── STATIC EVENT LISTENERS ────────────────────────────────────────────────
  document.getElementById('login-btn').addEventListener('click', doLogin);

  document.getElementById('eye-btn').addEventListener('click', () => {
    const inp  = document.getElementById('key-inp');
    const icon = document.getElementById('eye-icon');
    const show = inp.type === 'password';
    inp.type   = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  });
  document.getElementById('logout-btn').addEventListener('click', doLogout);
  document.getElementById('task-cancel-btn').addEventListener('click', closeTaskModal);
  document.getElementById('task-save-btn').addEventListener('click', saveTask);
  document.getElementById('cat-cancel-btn').addEventListener('click', closeCatModal);
  document.getElementById('cat-save-btn').addEventListener('click', saveCategory);
  document.getElementById('rename-cat-cancel-btn').addEventListener('click', closeRenameCatModal);
  document.getElementById('rename-cat-save-btn').addEventListener('click', saveRenameCategory);

  // Date input formatting
  document.getElementById('f-due').addEventListener('input', e => onDueInput(e.target));

  // Calendar toggle
  document.addEventListener('click', e => {
    const toggleBtn = e.target.closest('#cal-toggle-btn');
    if (toggleBtn) { toggleCalendar(); return; }
    // Close calendar if clicking outside the popup and outside the toggle btn
    if (calOpen && !e.target.closest('#cal-popup') && !e.target.closest('#cal-toggle-btn')) {
      closeCalendar();
    }
  }, true); // capture phase so it fires before other handlers

  // Enter on title field → save task (consistent with other modals)
  document.getElementById('f-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveTask(); }
  });

  // Modal backdrop clicks
  // Guard: si el mousedown empezó dentro del contenido del modal, ignorar el click
  // aunque el mouseup haya ocurrido sobre el backdrop (drag que termina afuera).
  let _modalMousedownOnContent = false;
  ['task-modal-bg', 'cat-modal-bg', 'rename-cat-modal-bg'].forEach(id => {
    const bg = document.getElementById(id);
    bg.addEventListener('mousedown', e => {
      // Si el click empezó dentro del cuadro (no en el backdrop mismo), lo marcamos
      _modalMousedownOnContent = e.target.id !== id;
    });
  });
  // Reseteo incondicional al soltar el mouse: evita que el flag quede sucio
  // si el mouseup cae fuera de cualquier backdrop y el click nunca lo limpia.
  document.addEventListener('mouseup', () => { _modalMousedownOnContent = false; });

  document.getElementById('task-modal-bg').addEventListener('click',       e => {
    if (_modalMousedownOnContent) return;
    if (e.target.id === 'task-modal-bg') closeTaskModal();
  });
  document.getElementById('cat-modal-bg').addEventListener('click',        e => {
    if (_modalMousedownOnContent) return;
    if (e.target.id === 'cat-modal-bg') closeCatModal();
  });
  document.getElementById('rename-cat-modal-bg').addEventListener('click', e => {
    if (_modalMousedownOnContent) return;
    if (e.target.id === 'rename-cat-modal-bg') closeRenameCatModal();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    // Escape closes any open modal or global search
    if (e.key === 'Escape') {
      closeTaskModal();
      closeCatModal();
      closeRenameCatModal();
      if (globalSearchOpen) toggleGlobalSearch();
      return;
    }

    // Ctrl+K → toggle global search (works even from inside inputs)
    if (e.ctrlKey && e.key === 'k') {
      e.preventDefault();
      toggleGlobalSearch();
      return;
    }

    // Skip shortcuts when typing inside an input, textarea or select
    const activeTag = document.activeElement?.tagName;
    if (activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT') return;

    // N → new task (works in any view)
    if (e.key === 'n' || e.key === 'N') {
      e.preventDefault();
      openTaskModal();
      return;
    }

    // / → focus the current list search input
    if (e.key === '/') {
      e.preventDefault();
      const searchInp = document.getElementById('search-inp');
      if (searchInp) searchInp.focus();
    }
  });

  document.getElementById('key-inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('cat-name-inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') { saveCategory(); e.preventDefault(); }
  });
  document.getElementById('rename-cat-inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') { saveRenameCategory(); e.preventDefault(); }
  });

  // ─── LIQUID GLASS INDICATOR ────────────────────────────────────────────────
  //
  // El indicador es un div absoluto dentro de .cat-bar que viaja entre botones.
  // Usa GSAP para la animación en 3 fases: expand → translate → settle.
  // La distorsión óptica la provee el SVG filter + backdrop-filter en CSS.
  // Usa GSAP para la animación en 3 fases: expand → translate → settle.
  // La distorsión óptica la provee el SVG filter + backdrop-filter en CSS.

  const lgIndicator = document.getElementById('lg-indicator');
  let lgCurrentBtn  = null;   // botón activo anterior (para comparar)
  let lgInitDone    = false;  // primer posicionamiento sin animación

  /**
   * Obtiene posición y dimensiones de un botón relativas al viewport.
   * Usamos fixed positioning ahora que el indicador está fuera del cat-bar.
   */
  function lgGetBtnRect(btn) {
    const r = btn.getBoundingClientRect();
    return {
      left:   Math.round(r.left),
      top:    Math.round(r.top),
      width:  Math.round(r.width),
      height: Math.round(r.height),
    };
  }

  /**
   * Posiciona el indicador sobre el botón activo.
   * Si es la primera vez, salta directo (sin animación).
   * Si ya había uno activo, ejecuta la secuencia expand → translate → settle.
   */
  // ─── LIQUID GLASS — COLOR STATE ─────────────────────────────────────────────
  // Guardamos el color visual actual del indicador para interpolar correctamente
  // incluso cuando una animación se interrumpe a mitad de camino.
  // En lugar de confiar en un flag, leemos el color real con getComputedStyle
  // en el momento del killTweensOf — así siempre interpolamos desde lo que
  // el usuario realmente ve, no desde lo que el código cree que debería verse.

  /** Interpola linealmente entre dos colores rgba en t (0..1) */
  function lgLerpColor(from, to, t) {
    const parse = s => (s.match(/[\d.]+/g) || []).map(Number);
    const [r1=0,g1=0,b1=0,a1=0] = parse(from);
    const [r2=0,g2=0,b2=0,a2=0] = parse(to);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    const a = +(a1 + (a2 - a1) * t).toFixed(3);
    return `rgba(${r}, ${g}, ${b}, ${a})`;
  }

  /** Aplica fondo + borde + sombra al indicador */
  function lgApplyColor(bg, border) {
    lgIndicator.style.background  = bg;
    lgIndicator.style.borderColor = border;
    lgIndicator.style.boxShadow   = [
      'inset 0 1px 0 rgba(255,255,255,0.18)',
      'inset 0 -1px 0 rgba(0,0,0,0.12)',
      '0 2px 16px rgba(0,0,0,0.35)',
      `0 0 0 1px ${border}`,
    ].join(', ');
  }

  /**
   * Lee el background-color visual actual del indicador directamente del DOM.
   * Esto garantiza que si una animación fue interrumpida a mitad de camino,
   * el color de origen para la próxima interpolación sea el que el usuario
   * realmente ve — no el color destino que nunca se llegó a aplicar.
   */
  function lgReadCurrentBg() {
    const cs = getComputedStyle(lgIndicator);
    return cs.backgroundColor || 'rgba(200, 240, 96, 0.32)';
  }

  function lgReadCurrentBorder() {
    const cs = getComputedStyle(lgIndicator);
    return cs.borderTopColor || 'rgba(200, 240, 96, 0.35)';
  }

  function lgMoveTo(activeBtn, destBg, destBorder) {
    if (!lgIndicator || !activeBtn) return;
    if (typeof gsap === 'undefined') return;

    // Ocultar preview al instante cuando el glass principal empieza a moverse
    lgHidePreview();

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const rect   = lgGetBtnRect(activeBtn);
    const catBar = document.getElementById('cat-bar');

    // Primera vez: posicionar y colorear sin animación
    if (!lgInitDone) {
      lgApplyColor(destBg, destBorder);
      gsap.set(lgIndicator, {
        left:    rect.left,
        top:     rect.top,
        width:   rect.width,
        height:  rect.height,
        opacity: 1,
        zIndex:  9,
      });
      catBar.classList.add('lg-active');
      lgCurrentBtn = activeBtn;
      lgInitDone   = true;
      return;
    }

    if (lgCurrentBtn === activeBtn) return;

    // Reduced motion: salto directo con color final
    if (prefersReduced) {
      lgApplyColor(destBg, destBorder);
      gsap.set(lgIndicator, {
        left:   rect.left,
        top:    rect.top,
        width:  rect.width,
        height: rect.height,
      });
      lgCurrentBtn = activeBtn;
      return;
    }

    // Capturar color visual actual ANTES de matar tweens —
    // getComputedStyle lee el valor renderizado real, incluso si la animación
    // anterior fue interrumpida a mitad de camino.
    const fromBg     = lgReadCurrentBg();
    const fromBorder = lgReadCurrentBorder();

    gsap.killTweensOf(lgIndicator);

    // Limpiar transform residual de la animación interrumpida antes de arrancar
    // la nueva. Sin esto, si el glass queda a mitad de un expand/stretch/settle,
    // la próxima timeline hereda ese scale y el resultado se congela o salta.
    gsap.set(lgIndicator, { scaleX: 1, scaleY: 1, zIndex: 9 });

    lgCurrentBtn = activeBtn;

    const tl = gsap.timeline({
      defaults: { ease: 'power3.inOut' },
      onUpdate: function() {
        // Interpolar color: completa la transición durante la primera mitad del viaje
        const t = Math.min(tl.progress() * 2, 1);
        lgIndicator.style.background  = lgLerpColor(fromBg,     destBg,     t);
        lgIndicator.style.borderColor = lgLerpColor(fromBorder, destBorder, t);
      },
      onComplete: function() {
        // Fijar color final limpio al terminar
        lgApplyColor(destBg, destBorder);
      },
    });

    // FASE 1: Expand inicial — el pill respira antes de soltarse
    tl.to(lgIndicator, {
      scaleX:   1.18,
      scaleY:   1.22,
      zIndex:   99,     // sube sobre todos los botones durante el viaje
      duration: 0.14,
      ease:     'power2.out',
    });

    // FASE 2: Stretch — se alarga y aplana como gota acelerando
    tl.to(lgIndicator, {
      scaleX:   1.32,
      scaleY:   0.72,
      duration: 0.12,
      ease:     'power2.in',
    });

    // FASE 3: Translate — viaja al destino manteniendo el stretch
    tl.to(lgIndicator, {
      left:     rect.left,
      top:      rect.top,
      width:    rect.width,
      height:   rect.height,
      duration: 0.28,
      ease:     'power3.inOut',
    });

    // FASE 4: Impact — se aplasta al llegar
    tl.to(lgIndicator, {
      scaleX:   1.14,
      scaleY:   0.82,
      duration: 0.09,
      ease:     'power2.out',
    });

    // FASE 5: Overshoot vertical — rebota hacia arriba
    tl.to(lgIndicator, {
      scaleX:   0.94,
      scaleY:   1.20,
      duration: 0.12,
      ease:     'power2.out',
    });

    // FASE 6: Settle — se asienta con amortiguación elástica y baja z-index
    tl.to(lgIndicator, {
      scaleX:   1,
      scaleY:   1,
      zIndex:   9,      // vuelve a su z-index normal
      duration: 0.38,
      ease:     'elastic.out(1, 0.42)',
    });
  }

  /**
   * Busca el botón activo en cat-bar, resuelve su color destino y mueve el indicador.
   * Se llama cada vez que renderCatBar() termina.
   */
  function lgSyncWithActiveBtn() {
    if (typeof gsap === 'undefined') return;

    const catBar = document.getElementById('cat-bar');
    if (!catBar) return;

    const activeBtn = catBar.querySelector('.cat-btn.active');

    if (!activeBtn) {
      gsap.to(lgIndicator, { opacity: 0, duration: 0.15 });
      catBar.classList.remove('lg-active');
      lgCurrentBtn = null;
      lgInitDone   = false;
      return;
    }

    // Resolver color destino: accent para "hoy", color de paleta para listas
    let destBg, destBorder;
    const catName = activeBtn.dataset.cat;
    if (catName && catColors[catName]) {
      // Amplificar opacidad del tinte (×2.5, máx 0.38) para visibilidad sobre dark bg
      const raw  = catColors[catName].bg;
      destBg     = raw.replace(/([.\d]+)\)$/, (_, v) => `${Math.min(parseFloat(v) * 2.5, 0.38)})`);
      destBorder = catColors[catName].border;
    } else {
      // "Tareas de hoy" — tinte accent verde
      destBg     = 'rgba(200, 240, 96, 0.32)';
      destBorder = 'rgba(200, 240, 96, 0.35)';
    }

    catBar.classList.add('lg-active');
    lgMoveTo(activeBtn, destBg, destBorder);
  }

  /**
   * Fix #2 (Duck): reposicionar el indicador si el layout cambia.
   * Cubre: resize de ventana, rotación en mobile, cambio de zoom,
   * y cualquier reflow que mueva los botones de fila (flex-wrap).
   *
   * Usamos ResizeObserver sobre #cat-bar en lugar de window 'resize'
   * porque captura también cambios internos del contenedor (ej: nueva lista
   * que hace que la barra wrappee a una segunda fila).
   *
   * Al detectar un cambio: reseteamos lgInitDone para que el próximo sync
   * posicione sin animación (no queremos que el glass "viaje" al hacer resize).
   */
  const lgResizeObserver = new ResizeObserver(() => {
    // Solo actuar si la app está visible y hay un indicador posicionado
    if (!lgInitDone) return;
    lgInitDone = false;         // próximo sync posiciona sin animación
    lgSyncWithActiveBtn();
  });

  // Empezar a observar cuando la app arranque (llamado desde init())
  function lgStartObserving() {
    const catBar = document.getElementById('cat-bar');
    if (catBar) lgResizeObserver.observe(catBar);

    // Re-sincronizar cuando las fuentes terminen de cargar —
    // DM Sans cambia el ancho de los botones y desplaza el indicador
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        lgInitDone = false;
        lgSyncWithActiveBtn();
      });
    }
  }

  // ─── LIQUID GLASS — HOVER PREVIEW ────────────────────────────────────────
  //
  // Muestra una versión tenue del glass sobre el botón que el cursor está
  // sobrevolando (sin hacer click). Da la sensación de que el indicador
  // "anticipa" el destino antes de la acción.
  //
  // Implementación: mouseenter/mouseleave delegados en cat-bar.
  // Solo actúa sobre botones inactivos — el botón activo ya tiene el glass real.
  // No usa GSAP para el posicionamiento: es una transición CSS simple (opacity).

  const lgPreview = document.getElementById('lg-preview');
  let lgPreviewActive = false;

  function lgShowPreview(btn) {
    if (!lgPreview || !lgInitDone) return;
    if (btn.classList.contains('active')) return; // el glass principal ya está acá
    if (typeof gsap === 'undefined') return;

    const rect = lgGetBtnRect(btn);
    gsap.set(lgPreview, {
      left:   rect.left,
      top:    rect.top,
      width:  rect.width,
      height: rect.height,
    });
    lgPreview.style.opacity = '1';
    lgPreviewActive = true;
  }

  function lgHidePreview() {
    if (!lgPreview) return;
    lgPreview.style.opacity = '0';
    lgPreviewActive = false;
  }

  // Delegación de eventos en cat-bar — se re-bindea automáticamente
  // porque cat-bar no se destruye (solo su contenido innerHTML)
  document.getElementById('cat-bar').addEventListener('mouseenter', e => {
    const btn = e.target.closest('.cat-btn');
    if (btn) lgShowPreview(btn);
  }, true);

  document.getElementById('cat-bar').addEventListener('mouseleave', e => {
    const btn = e.target.closest('.cat-btn');
    if (btn) lgHidePreview();
  }, true);

  // ─── BOOT ──────────────────────────────────────────────────────────────────
  //
  // Fix #1 (Duck): si GSAP todavía no cargó cuando se ejecuta el boot
  // (puede pasar con sesión guardada + CDN lento), esperamos al evento
  // 'load' del script antes de intentar usar gsap por primera vez.
  // lgSyncWithActiveBtn ya tiene un guard interno, pero esto garantiza
  // que el indicador aparezca aunque GSAP llegue tarde.

  function bootApp() {
    const saved = localStorage.getItem(LKEY);
    if (saved === SECRET) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').classList.add('visible');
      init();
    }
  }

  const gsapScript = document.querySelector('script[src*="gsap"]');
  if (typeof gsap !== 'undefined') {
    // GSAP ya está disponible (caso normal — script bloqueante ya ejecutó)
    bootApp();
  } else if (gsapScript) {
    // GSAP todavía cargando — esperamos su evento load
    gsapScript.addEventListener('load', bootApp);
    // Fallback: si el script falla (sin red), igual arrancamos la app sin glass
    gsapScript.addEventListener('error', bootApp);
  } else {
    // No hay script de GSAP en el DOM (caso inesperado) — arrancamos igual
    bootApp();
  }

</script>
