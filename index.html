<!-- ─── LIQUID GLASS — SVG FILTERS ──────────────────────────────────────────── -->
<!--
  lg-refract: simula el efecto de lensing de Apple WWDC25.
  Pipeline:
    1. feTurbulence   → ruido fractal de baja frecuencia (textura orgánica de vidrio)
    2. feGaussianBlur → suaviza el mapa de ruido para distorsión fluida, no granulada
    3. feDisplacementMap → desplaza los píxeles del backdrop según el mapa suavizado

  El scale (6) produce un lensing sutil pero visible en los bordes.
  baseFrequency baja → ondas largas que se parecen a refracción real de vidrio.
  Solo funciona en Chrome/Edge (backdrop-filter: url()). Safari usa fallback blur.
-->
<svg class="lg-filter-host" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Refracción base: blur + desplazamiento fractal suave para el body del indicador -->
    <filter id="lg-refract" x="-20%" y="-20%" width="140%" height="140%"
            color-interpolation-filters="sRGB">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.012 0.016"
        numOctaves="3"
        seed="8"
        result="noise"
      />
      <feGaussianBlur in="noise" stdDeviation="3" result="smoothNoise" />
      <feDisplacementMap
        in="SourceGraphic"
        in2="smoothNoise"
        scale="6"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>

    <!--
      Lupa de gota de agua — mapa de desplazamiento radial.
      Cómo funciona:
        - feFlood + feComposite generan un disco sólido con forma de la gota.
        - feGaussianBlur suaviza los bordes del disco → mapa de desplazamiento radial.
        - feDisplacementMap usa el canal R (horizontal) y G (vertical) del mapa:
            · En el centro del disco: gris 50% → sin desplazamiento (vidrio plano)
            · En los bordes del disco: gradiente → desplaza los píxeles hacia adentro
          El resultado es que el borde de la gota curva el contenido detrás,
          igual que una lente convexa o una gota de agua real sobre texto.
      scale="18": lensing visible sin ser grotesco.
      Funciona solo en Chrome/Edge (backdrop-filter: url()). Safari ve solo blur.
    -->
    <filter id="lg-water-drop" x="-25%" y="-25%" width="150%" height="150%"
            color-interpolation-filters="sRGB">
      <!-- Paso 1: disco que representa la forma de la gota -->
      <feFlood flood-color="rgb(128,128,0)" result="neutralFlood" />
      <!-- Paso 2: máscara circular suave usando alpha del SourceGraphic -->
      <feComposite in="neutralFlood" in2="SourceGraphic" operator="in" result="disc" />
      <!-- Paso 3: suavizar el borde → crea el gradiente radial de desplazamiento -->
      <feGaussianBlur in="disc" stdDeviation="8" result="softDisc" />
      <!-- Paso 4: aplicar el mapa al backdrop para curvar el contenido detrás -->
      <feDisplacementMap
        in="SourceGraphic"
        in2="softDisc"
        scale="18"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </defs>
</svg>

<!-- ─── LOGIN SCREEN ────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">List-a<span>Do</span></div>
    <div class="login-sub">gestor de tareas personal</div>
    <div class="login-label">Clave de acceso</div>
    <div class="login-input-wrap">
      <input class="login-input" type="password" id="key-inp" placeholder="••••••••" autocomplete="current-password" />
      <button class="login-eye-btn" id="eye-btn" type="button" title="Mostrar/ocultar clave">
        <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="login-error" id="login-error">Clave incorrecta. Intentá de nuevo.</div>
    <button class="login-btn" id="login-btn">Entrar</button>
  </div>
</div>

<!-- ─── APP SCREEN ───────────────────────────────────────────────────────────── -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">List-a<span>Do</span></div>
    <div class="topbar-right">
      <div class="stats-pill">
        <div class="stat-item"><span class="stat-label">Total</span><span class="stat-val" id="s-total">0</span></div>
        <div class="stat-item"><span class="stat-label">Pendientes</span><span class="stat-val" id="s-pend">0</span></div>
        <div class="stat-item soon"><span class="stat-label">Por vencer</span><span class="stat-val" id="s-soon">0</span></div>
        <div class="stat-item over"><span class="stat-label">Vencidas</span><span class="stat-val" id="s-over">0</span></div>
      </div>
      <button class="logout-btn" id="logout-btn">Salir</button>
    </div>
  </div>
  <div class="main">
    <!-- cat-bar es position:relative — indicator y preview son sus hijos absolutos.
         renderCatBar() los preserva al reescribir innerHTML. -->
    <div class="cat-bar" id="cat-bar">
      <div id="lg-refraction" aria-hidden="true"></div>
      <div id="lg-lens-layer" aria-hidden="true"></div>
      <div id="lg-indicator" aria-hidden="true">
        <div id="lg-specular"></div>
      </div>
      <div id="lg-preview" aria-hidden="true"></div>
    </div>
    <div id="view-container">
      <div class="loading-wrap">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span class="loading-label">Cargando tareas…</span>
      </div>
    </div>
  </div>
</div>

<!-- ─── MODAL: TASK ──────────────────────────────────────────────────────────── -->
<div class="modal-bg" id="task-modal-bg">
  <div class="modal">
    <div class="modal-inner">
    <div class="modal-title" id="task-modal-title">Nueva tarea</div>
    <div class="field">
      <label class="field-label">Título</label>
      <input type="text" id="f-title" placeholder="¿Qué tenés que hacer?" />
    </div>
    <div class="field">
      <label class="field-label">Descripción (opcional)</label>
      <textarea id="f-desc" rows="2" placeholder="Detalles..."></textarea>
    </div>
    <div class="field">
      <label class="field-label">Lista</label>
      <select id="f-category"></select>
    </div>
    <div class="field">
      <label class="field-label">Vencimiento (opcional)</label>
      <div class="date-field-row">
        <input type="text" class="date-text-inp" id="f-due" placeholder="ej: 15/06/2026" maxlength="10" autocomplete="off" inputmode="numeric" />
        <button type="button" class="cal-toggle-btn" id="cal-toggle-btn" title="Abrir calendario"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block"><rect x="1" y="2.5" width="13" height="11" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="1" y1="6" x2="14" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="4.5" y1="1" x2="4.5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="10.5" y1="1" x2="10.5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="5" cy="9.5" r="0.9" fill="currentColor"/><circle cx="7.5" cy="9.5" r="0.9" fill="currentColor"/><circle cx="10" cy="9.5" r="0.9" fill="currentColor"/></svg></button>
      </div>
      <div class="date-hint" id="due-hint"></div>
      <div id="cal-popup-wrap"></div>
    </div>
    <div class="field">
      <label class="field-label">Agendar en el calendario (opcional)</label>
      <div class="sched-modal-row">
        <input type="date" id="f-sched-date" class="sched-date-inp" />
        <input type="time" id="f-sched-start" class="sched-time-inp" />
        <span class="sched-time-sep">a</span>
        <input type="time" id="f-sched-end" class="sched-time-inp" />
      </div>
      <div class="date-hint" id="sched-hint"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="task-cancel-btn">Cancelar</button>
      <button class="btn-save" id="task-save-btn">Guardar</button>
    </div>
    </div>
  </div>
</div>

<!-- ─── MODAL: NUEVA LISTA ───────────────────────────────────────────────────── -->
<div class="modal-bg" id="cat-modal-bg">
  <div class="modal" style="max-width:360px">
    <div class="modal-inner">
    <div class="modal-title">Nueva lista</div>
    <div class="field">
      <label class="field-label">Nombre</label>
      <input type="text" id="cat-name-inp" placeholder="Ej: Proyectos, Compras..." />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cat-cancel-btn">Cancelar</button>
      <button class="btn-save" id="cat-save-btn">Crear lista</button>
    </div>
    </div>
  </div>
</div>

<!-- ─── MODAL: RENOMBRAR LISTA ───────────────────────────────────────────────── -->
<div class="modal-bg" id="rename-cat-modal-bg">
  <div class="modal" style="max-width:360px">
    <div class="modal-inner">
    <div class="modal-title">Renombrar lista</div>
    <div class="field">
      <label class="field-label">Nuevo nombre</label>
      <input type="text" id="rename-cat-inp" placeholder="Nombre de la lista..." />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="rename-cat-cancel-btn">Cancelar</button>
      <button class="btn-save" id="rename-cat-save-btn">Guardar</button>
    </div>
    </div>
  </div>
</div>

<!-- ─── TOAST ────────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── APP ENTRY POINT ──────────────────────────────────────────────────────── -->
<script type="module" src="app.js"></script>

</body>
</html>
